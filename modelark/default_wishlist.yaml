# Packaged default configuration. A user config at the platform config directory
# (or `modelark --config PATH`) overrides this file.

compression:
  max_compress_ram_gb: 4.0
  stream_compress: true
  threads: 1

download:
  max_24h_gb: 1000

logging:
  level: INFO
  file: logs/modelark.log
  max_mb: 20
  backups: 5
  console: true

scope:
  include_categories:
    - generative-llm
    - encoder
    - seq2seq
    - translation
    - embedding
    - reranker
    - classifier
    - qa
    - compression
    - asr
    - tts
    - speech-lm
    - audio-gen
    - world-model
    - image-gen
always_include:
  orgs:
    - deepseek-ai
    - Qwen
    - moonshotai
    - zai-org
    - MiniMaxAI
    - tencent
    - stepfun-ai
    - OpenGVLab
    - XiaomiMiMo
    - baidu
    - 01-ai
    - openbmb
    - internlm
    - meta-llama
    - mistralai
    - google
    - microsoft
    - nvidia
    - allenai
    - ibm-granite
    - tiiuae
    - arcee-ai
    - CohereLabs
    - NousResearch
    - ai21labs
    - LiquidAI
    - LGAI-EXAONE
    - SakanaAI
    - bigcode
    - HuggingFaceTB
    - answerdotai
    - google-bert
    - FacebookAI
    - BAAI
    - sentence-transformers
    - intfloat
    - nomic-ai
    - jinaai
    - mixedbread-ai
    - Snowflake
    - Alibaba-NLP
    - openai
    - facebook
    - suno
    - hexgrad
    - coqui
    - fishaudio
    - parler-tts
    - kyutai
    - sesame
    - SWivid
    - black-forest-labs
    - stabilityai
    - playgroundai
exclude:
  # Enforced by archive planning; false opts into storing pickle weights as inert raw bytes.
  pickle_only: true
