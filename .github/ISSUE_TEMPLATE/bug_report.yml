name: Bug report
description: Report a reproducible ModelArk defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not post secrets or infrastructure identifiers. Use SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: git rev-parse --short HEAD
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Commands and minimal steps, using sanitized paths and device identifiers.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
  - type: checkboxes
    id: integrity
    attributes:
      label: Integrity impact
      options:
        - label: This may involve data loss, corruption, a false verification pass, or destructive drive behavior (prefix the title `[P1]`).
