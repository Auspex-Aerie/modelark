name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator workflow or failure mode needs improvement?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Alternatives and tradeoffs
