name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # Core suite — pure Python, fast, no browser. Excludes the E2E (its own job below).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.12" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: System deps (git-annex for the storage-layer tests)
        run: sudo apt-get update && sudo apt-get install -y git-annex

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite (excluding E2E)
        run: |
          set -e
          for t in tests/test_*.py; do
            [ "$t" = "tests/test_e2e_portal.py" ] && { echo "== $t -> e2e job =="; continue; }
            echo "== $t =="
            python "$t"
          done

      - name: Static correctness checks
        run: ruff check modelark scripts tests

      - name: Build distribution wheel
        if: matrix.python-version == '3.12'
        run: python -m pip wheel . --no-deps --wheel-dir /tmp/modelark-wheel

      - name: Smoke-test the installed wheel and packaged resources
        if: matrix.python-version == '3.12'
        run: |
          pip uninstall -y modelark
          pip install --no-deps /tmp/modelark-wheel/modelark-*.whl
          cd /tmp
          python -c "import tempfile; from pathlib import Path; from importlib.metadata import distribution; import scripts; from modelark import wishlist; from modelark.core import db; from modelark.web import server; d=tempfile.mkdtemp(); db.configure(d); c=db.connect(_bootstrapping=True); c.close(); assert wishlist.download()['max_24h_gb']==1000; assert (server.STATIC/'index.html').is_file(); assert db.DB_PATH.is_file() and Path(d) in db.DB_PATH.parents; assert scripts.__file__; names={e.name for e in distribution('modelark').entry_points}; assert {'modelark-migrate','modelark-deploy'} <= names"
          python -c "import re; from importlib.metadata import metadata, requires; m=metadata('modelark'); r=requires('modelark') or []; name=lambda x: re.match(r'[A-Za-z0-9._-]+', x).group(0); canon=lambda x: re.sub(r'[-_.]+','-',name(x).lower()); assert m['License-Expression']=='Apache-2.0'; assert m['Project-URL']; assert not any(canon(x) in {'duckdb','hf-transfer'} and 'extra ==' not in x for x in r)"
          modelark-migrate --help
          modelark-deploy --source "$GITHUB_WORKSPACE" --venv /tmp/modelark-deploy-venv --dry-run

  # Browser E2E — boots the portal on a seeded catalog and drives it headless with Playwright.
  # Separate job so the core suite stays zero-dep and fast; this one pays for a browser install.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps (git-annex)
        run: sudo apt-get update && sudo apt-get install -y git-annex

      - name: Install (+ Playwright Chromium)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          playwright install --with-deps chromium

      - name: Portal E2E (headless)
        run: python tests/test_e2e_portal.py
